server:
  host: 0.0.0.0
  port: 8002
  workers: 1

database:
  url: sqlite+aiosqlite:///./visiongrid.db

detection:
  model: yolov8n
  confidence: 0.5
  device: cpu

storage_path: ./data
log_level: INFO

# Agent DVR running on localhost:8090
# Cameras exposed via snapshot endpoint: grab.jpg?oid={id}&ot=2
cameras:
  - name: camera-1
    url: http://localhost:8090/grab.jpg?oid=1&ot=2
    protocol: snapshot
    fps: 5
    detection:
      model: yolov8n
      confidence: 0.5
      classes: [person, car, dog, cat, bicycle, motorcycle]
    zones:
      - name: zona-completa
        points: [[0.0, 0.0], [1.0, 0.0], [1.0, 1.0], [0.0, 1.0]]
        triggers: [enter, exit]

  - name: camera-2
    url: http://localhost:8090/grab.jpg?oid=2&ot=2
    protocol: snapshot
    fps: 5
    detection:
      model: yolov8n
      confidence: 0.5
      classes: [person, car, dog, cat]

  - name: camera-3
    url: http://localhost:8090/grab.jpg?oid=3&ot=2
    protocol: snapshot
    fps: 5
    detection:
      model: yolov8n
      confidence: 0.5
      classes: [person, car, dog, cat]
