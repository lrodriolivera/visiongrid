server:
  host: 0.0.0.0
  port: 8000
  workers: 1

database:
  url: sqlite+aiosqlite:///./visiongrid.db

detection:
  model: yolov8n
  confidence: 0.5
  device: cpu

storage_path: ./data
log_level: INFO

cameras:
  - name: casa-principal
    url: http://localhost:8090/
    protocol: http
    fps: 10
    detection:
      model: yolov8n
      confidence: 0.5
      classes: [person, car, dog, cat, bicycle, motorcycle]
    zones:
      - name: entrada
        points: [[0.0, 0.0], [1.0, 0.0], [1.0, 1.0], [0.0, 1.0]]
        triggers: [enter, exit]
